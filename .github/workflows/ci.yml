name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          
      - name: Make gradlew executable
        run: chmod +x gradlew
          
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0

      - name: Build with Gradle Wrapper
        run: ./gradlew build

      - name: Get short commit hash
        id: vars
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Locate and rename JAR
        run: |
          # 排除包含 'original'
          JAR_FILE=$(find build/jars -type f -name "VelocityTitle-*.jar" ! -name "*-original.jar" | head -n 1)
          if [ -z "$JAR_FILE" ]; then
            echo "Error: No VelocityTitle JAR found in build/jars/"
            exit 1
          fi
          echo "Found JAR: $JAR_FILE"
          # 重命名
          mv "$JAR_FILE" "build/jars/VelocityTitle-${{ steps.vars.outputs.short_sha }}.jar"
          echo "JAR renamed to VelocityTitle-${{ steps.vars.outputs.short_sha }}.jar"

      - name: Upload JAR as artifact
        uses: actions/upload-artifact@v4
        with:
          name: VelocityTitle-${{ steps.vars.outputs.short_sha }}
          path: build/jars/VelocityTitle-${{ steps.vars.outputs.short_sha }}.jar
          if-no-files-found: error
