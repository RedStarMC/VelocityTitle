name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          
      - name: Make gradlew executable
        run: chmod +x gradlew
          
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0

      - name: Build with Gradle Wrapper
        run: ./gradlew build

      - name: Get short commit hash
        id: vars
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Rename JAR files with commit hash
        run: |
          cd build/jars
          SHORT_SHA="${{ steps.vars.outputs.short_sha }}"
          # 包含 VelocityTitle-*.jar 文件，排除 -original.jar
          for file in VelocityTitle-*.jar; do
            if [[ "$file" == *-original.jar ]]; then
              echo "Skipping original file: $file"
              continue
            fi
            # 将版本号替换为提交哈希
            new_name=$(echo "$file" | sed "s/[0-9]\+\.[0-9]\+\.[0-9]\+/$SHORT_SHA/")
            echo "Renaming $file to $new_name"
            mv "$file" "$new_name"
          done
          ls -l

      - name: Upload JARs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: VelocityTitle-${{ steps.vars.outputs.short_sha }}
          path: build/jars/VelocityTitle-*.jar
          if-no-files-found: error
