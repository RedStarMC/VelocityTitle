name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0

      - name: Build with Gradle Wrapper
        run: ./gradlew build

      - name: Get short commit hash
        id: vars
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Rename and upload JAR
        run: |
          # 原始 jar 路径
          ORIGINAL_JAR="build/jars/VelocityTitle-0.1.2.jar"
          NEW_JAR="build/jars/VelocityTitle-${{ steps.vars.outputs.short_sha }}.jar"
          if [ -f "$ORIGINAL_JAR" ]; then
            mv "$ORIGINAL_JAR" "$NEW_JAR"
            echo "JAR renamed to $NEW_JAR"
          else
            echo "Error: JAR file not found at $ORIGINAL_JAR"
            exit 1
          fi

      - name: Upload JAR as artifact
        uses: actions/upload-artifact@v4
        with:
          name: VelocityTitle-${{ steps.vars.outputs.short_sha }}
          path: build/jars/VelocityTitle-${{ steps.vars.outputs.short_sha }}.jar
          if-no-files-found: error
